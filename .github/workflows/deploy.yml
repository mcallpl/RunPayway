name: Build & Deploy to GoDaddy

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Move server-only files aside for static export
        run: |
          mv src/app/api src/app/_api_dev
          mv src/middleware.ts src/_middleware_dev.ts

      - name: Build static export
        env:
          STATIC_EXPORT: 'true'
        run: npx next build

      - name: Restore server-only files
        run: |
          mv src/app/_api_dev src/app/api
          mv src/_middleware_dev.ts src/middleware.ts

      - name: Deploy frontend to GoDaddy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: /public_html/RunPayway/
          dangerous-clean-slate: true  # Force full re-upload — revert to false after this deploy
