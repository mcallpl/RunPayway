name: Build & Deploy to GoDaddy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  STATIC_EXPORT: 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Move server-only files aside for static export
        run: |
          mv src/app/api src/app/_api_dev
          mv src/middleware.ts src/_middleware_dev.ts

      - name: Build static export
        run: |
          echo "STATIC_EXPORT=$STATIC_EXPORT"
          npx next build
          echo "Build complete. Checking for out/ directory..."
          ls -la out/ | head -5

      - name: Restore server-only files
        if: always()
        run: |
          if [ -d src/app/_api_dev ]; then mv src/app/_api_dev src/app/api; fi
          if [ -f src/_middleware_dev.ts ]; then mv src/_middleware_dev.ts src/middleware.ts; fi

      - name: Deploy frontend to GoDaddy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: /public_html/RunPayway/
          dangerous-clean-slate: false

      - name: Smoke test — verify worker endpoints
        run: bash scripts/smoke-test.sh
