name: Build & Deploy to GoDaddy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Move server-only files aside for static export
        run: |
          mv src/app/api src/app/_api_dev
          mv src/middleware.ts src/_middleware_dev.ts

      - name: Build static export
        env:
          STATIC_EXPORT: 'true'
        run: npx next build > build-output.txt 2>&1 || true

      - name: Show build output
        if: always()
        run: cat build-output.txt

      - name: Check build success
        run: |
          if [ ! -d out ]; then
            echo "ERROR: out/ directory not created — build failed"
            echo "=== LAST 50 LINES OF BUILD OUTPUT ==="
            tail -50 build-output.txt
            exit 1
          fi
          echo "Build succeeded — out/ directory exists"
          ls out/

      - name: Restore server-only files
        if: always()
        run: |
          if [ -d src/app/_api_dev ]; then mv src/app/_api_dev src/app/api; fi
          if [ -f src/_middleware_dev.ts ]; then mv src/_middleware_dev.ts src/middleware.ts; fi

      - name: Deploy frontend to GoDaddy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: /public_html/RunPayway/
          dangerous-clean-slate: false
